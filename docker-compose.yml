version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: blog-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog_system
    ports:
      - '5432:5432'
    volumes:
      - blog_system_pgdata:/var/lib/postgresql/data

volumes:
  blog_system_pgdata:
